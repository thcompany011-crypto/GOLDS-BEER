<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GoldsBeer | Gestão Rápida</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<style>

:root{
    --gold:#d4af37;
    --dark:#121212;
    --card:#1e1e1e;
    --new-item:#20311e;
    --new-border:#5fd35f;
}

*{
    box-sizing:border-box;
}

body{
    background:var(--dark);
    color:white;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:10px;
}

.container{
    background:var(--card);
    padding:25px;
    border-radius:15px;
    border:1px solid #333;
    width:100%;
    max-width:450px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

h2{
    color:var(--gold);
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    position:relative;
    margin-bottom:12px;
}

input{
    width:100%;
    padding:14px;
    border-radius:8px;
    border:1px solid #444;
    background:#2a2a2a;
    color:white;
    outline:none;
    font-size:1rem;
}

input:focus{
    border-color:var(--gold);
}

.toggle-pass{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    color:var(--gold);
    cursor:pointer;
    font-size:.75rem;
    font-weight:bold;
}

button{
    width:100%;
    padding:14px;
    background:var(--gold);
    color:black;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:8px;
}

.hidden{
    display:none !important;
}

.tabs{
    display:flex;
    gap:5px;
    margin-bottom:15px;
}

.tab-btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#333;
    color:#888;
    cursor:pointer;
}

.tab-btn.active{
    background:var(--gold);
    color:black;
}

#log-lista{
    background:#111;
    padding:15px;
    border-radius:8px;
    border:1px solid #333;
    margin-top:15px;
}

.lista-itens{
    max-height:420px;
    overflow-y:auto;
}

.item{
    padding:12px;
    border-bottom:1px solid #222;
}

.item:last-child{
    border-bottom:none;
}

.item b{
    color:var(--gold);
}

.status-badge{
    display:inline-block;
    margin-left:8px;
    padding:3px 8px;
    border-radius:20px;
    font-size:.68rem;
    font-weight:bold;
}

.status-aberto{
    background:#6a5200;
    color:#fff1b0;
}

.status-confirmado{
    background:#165c16;
    color:#b9ffb9;
}

.preview-img,
.item-img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
    max-height:220px;
    object-fit:cover;
}

.small-tip{
    color:#888;
    font-size:.75rem;
    margin-bottom:10px;
}

.item-novo{
    background:var(--new-item);
    border:1px solid var(--new-border);
    border-radius:10px;
}

.logout-btn{
    background:transparent;
    border:1px solid #333;
    color:#888;
}

</style>
</head>

<body>

<div id="login-screen" class="container">

    <h2>GOLDSBEER</h2>

    <div class="input-group">
        <input type="text" id="user" placeholder="USUÁRIO">
    </div>

    <div class="input-group">
        <input type="password" id="pass" placeholder="SENHA">
        <span class="toggle-pass" onclick="togglePassword()">VER</span>
    </div>

    <button onclick="verificarLogin()">
        ENTRAR
    </button>

</div>

<div id="main-screen" class="container hidden">

    <h2 id="welcome-msg">CARREGANDO...</h2>

    <div id="area-registro" class="hidden">

        <input
            type="text"
            id="numComanda"
            placeholder="NÚMERO DA COMANDA"
            inputmode="numeric"
            oninput="mostrarUltimos4()"
        >

        <div class="small-tip">
            O sistema salva apenas os 4 últimos números.
        </div>

        <input
            type="text"
            id="ultimos4"
            placeholder="ÚLTIMOS 4 NÚMEROS"
            readonly
        >

        <div style="margin-top:10px;">
            <input
                type="text"
                id="pedido"
                placeholder="PEDIDO"
            >
        </div>

        <div style="margin-top:10px;">
            <input
                type="file"
                id="fotoComanda"
                accept="image/*"
                capture="environment"
                onchange="carregarFoto(event)"
            >
        </div>

        <img
            id="previewFoto"
            class="preview-img hidden"
        >

        <button
            id="btn-registrar"
            onclick="registrarComanda()"
        >
            REGISTRAR COMANDA
        </button>

    </div>

    <div id="area-abas" class="tabs hidden">

        <button
            class="tab-btn active"
            id="tab-pend"
            onclick="mudarAba('aberto')"
        >
            EM ABERTO
        </button>

        <button
            class="tab-btn"
            id="tab-incl"
            onclick="mudarAba('confirmado')"
        >
            CONFIRMADOS
        </button>

    </div>

    <div id="log-lista">

        <div id="itens" class="lista-itens">
            Carregando...
        </div>

        <button
            id="btn-limpar"
            class="hidden"
            onclick="limparHistorico()"
            style="background:#8b0000;"
        >
            LIMPAR HISTÓRICO
        </button>

    </div>

    <button
        onclick="fazerLogout()"
        class="logout-btn"
    >
        SAIR
    </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    updateDoc,
    doc,
    getDocs,
    deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
    getStorage,
    ref,
    uploadString,
    getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {

    apiKey: "AIzaSyCeZEg5jintah_-BN5mTgUEjLq40Je3bRs",

    authDomain: "goldsbeer.firebaseapp.com",

    projectId: "goldsbeer",

    storageBucket: "goldsbeer.firebasestorage.app",

    messagingSenderId: "307388725248",

    appId: "1:307388725248:web:80ecfbf2fbd23706a7c0e5"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);

window.togglePassword = togglePassword;
window.verificarLogin = verificarLogin;
window.registrarComanda = registrarComanda;
window.mudarAba = mudarAba;
window.marcarAprovado = marcarAprovado;
window.limparHistorico = limparHistorico;
window.fazerLogout = fazerLogout;
window.carregarFoto = carregarFoto;
window.mostrarUltimos4 = mostrarUltimos4;

const ACESSOS = {

    "matheus":{
        senha:"Goldsbeer1003",
        tipo:"atendente",
        nome:"Matheus"
    },

    "alex th":{
        senha:"Goldsbeer11",
        tipo:"atendente",
        nome:"Alex Th"
    },

    "novo":{
        senha:"teste123",
        tipo:"atendente",
        nome:"Novo"
    },

    "conferencia":{
        senha:"admingoldsbeer2026",
        tipo:"conferencia",
        nome:"Conferência"
    }
};

let usuarioLogado = "";
let nomeAtendente = "";
let tipoUsuario = "";
let abaAtual = "aberto";
let cachePedidos = [];
let fotoBase64 = "";

function togglePassword(){

    const c = document.getElementById('pass');

    c.type =
        c.type === "password"
        ? "text"
        : "password";
}

window.onload = function(){

    const u = localStorage.getItem('gb_user');

    if(u && ACESSOS[u]){

        usuarioLogado = u;

        nomeAtendente = ACESSOS[u].nome;

        tipoUsuario = ACESSOS[u].tipo;

        iniciarPainel();
    }
};

function verificarLogin(){

    const u =
        document.getElementById('user')
        .value.toLowerCase().trim();

    const p =
        document.getElementById('pass')
        .value.trim();

    if(
        ACESSOS[u]
        &&
        ACESSOS[u].senha === p
    ){

        usuarioLogado = u;

        nomeAtendente = ACESSOS[u].nome;

        tipoUsuario = ACESSOS[u].tipo;

        localStorage.setItem('gb_user',u);

        iniciarPainel();

    }else{

        alert("Usuário ou senha incorretos!");
    }
}

async function iniciarPainel(){

    document.getElementById('login-screen')
    .classList.add('hidden');

    document.getElementById('main-screen')
    .classList.remove('hidden');

    document.getElementById('welcome-msg')
    .innerText =
        tipoUsuario === "conferencia"
        ? "OLÁ, CONFERÊNCIA"
        : "OLÁ, " + nomeAtendente.toUpperCase();

    if(tipoUsuario === "conferencia"){

        document.getElementById('area-registro')
        .classList.add('hidden');

        document.getElementById('area-abas')
        .classList.remove('hidden');

        document.getElementById('btn-limpar')
        .classList.remove('hidden');

    }else{

        document.getElementById('area-registro')
        .classList.remove('hidden');
    }

    atualizarDados();
}

function mostrarUltimos4(){

    const valor =
        document.getElementById('numComanda')
        .value.replace(/\D/g,'');

    document.getElementById('ultimos4')
    .value = valor.slice(-4);
}

function carregarFoto(event){

    const arquivo = event.target.files[0];

    const preview =
        document.getElementById('previewFoto');

    if(!arquivo){

        fotoBase64 = "";

        preview.src = "";

        preview.classList.add('hidden');

        return;
    }

    const img = new Image();

    const reader = new FileReader();

    reader.onload = function(e){

        img.src = e.target.result;

        img.onload = function(){

            const canvas =
                document.createElement("canvas");

            const ctx =
                canvas.getContext("2d");

            const maxWidth = 600;

            const scale =
                maxWidth / img.width;

            canvas.width = maxWidth;

            canvas.height =
                img.height * scale;

            ctx.drawImage(
                img,
                0,
                0,
                canvas.width,
                canvas.height
            );

            fotoBase64 =
                canvas.toDataURL(
                    "image/jpeg",
                    0.5
                );

            preview.src = fotoBase64;

            preview.classList.remove('hidden');
        };
    };

    reader.readAsDataURL(arquivo);
}

async function registrarComanda(){

    const numeroCompleto =
        document.getElementById('numComanda')
        .value.replace(/\D/g,'');

    const ultimos4 =
        numeroCompleto.slice(-4);

    const pedido =
        document.getElementById('pedido')
        .value.trim();

    if(!numeroCompleto || ultimos4.length < 4){

        alert("Digite a comanda.");

        return;
    }

    if(!pedido){

        alert("Digite o pedido.");

        return;
    }

    const btn =
        document.getElementById('btn-registrar');

    btn.disabled = true;

    btn.innerText = "REGISTRANDO...";

    let fotoURL = "";

    try{

        if(fotoBase64){

            const storageRef =
                ref(
                    storage,
                    `comandas/${Date.now()}.jpg`
                );

            await uploadString(
                storageRef,
                fotoBase64,
                'data_url'
            );

            fotoURL =
                await getDownloadURL(storageRef);
        }

        await addDoc(
            collection(db,"comandas"),
            {

                numero:ultimos4,

                pedido:pedido,

                foto:fotoURL,

                atendente:nomeAtendente,

                status:"aberto",

                confirmado:"",

                data:new Date().toLocaleString()
            }
        );

        document.getElementById('numComanda').value = "";

        document.getElementById('ultimos4').value = "";

        document.getElementById('pedido').value = "";

        document.getElementById('fotoComanda').value = "";

        document.getElementById('previewFoto').src = "";

        document.getElementById('previewFoto')
        .classList.add('hidden');

        fotoBase64 = "";

    }catch(e){

        console.error(e);

        alert("Erro ao registrar.");
    }

    btn.disabled = false;

    btn.innerText = "REGISTRAR COMANDA";
}

function atualizarDados(){

    onSnapshot(
        collection(db,"comandas"),

        (snapshot)=>{

            cachePedidos = [];

            snapshot.forEach((docItem)=>{

                cachePedidos.push({

                    id:docItem.id,

                    ...docItem.data()
                });
            });

            renderizarLista(cachePedidos);
        }
    );
}

function mudarAba(aba){

    abaAtual = aba;

    renderizarLista(cachePedidos);
}

async function marcarAprovado(id){

    try{

        await updateDoc(
            doc(db,"comandas",id),
            {
                status:"confirmado",
                confirmado:nomeAtendente
            }
        );

    }catch(e){

        alert("Erro ao confirmar!");
    }
}

function renderizarLista(lista){

    const box =
        document.getElementById('itens');

    let filtrados =
        lista.filter((p)=>{

            if(tipoUsuario === "conferencia"){

                return p.status === abaAtual;
            }

            return p.status === "aberto";
        });

    if(filtrados.length === 0){

        box.innerHTML =
            "<p>Nenhum registro</p>";

        return;
    }

    box.innerHTML =
        filtrados.map((p)=>{

            return `

            <div class="item">

                <b># ${p.numero}</b>

                <span class="status-badge ${
                    p.status === "confirmado"
                    ? "status-confirmado"
                    : "status-aberto"
                }">

                    ${
                        p.status === "confirmado"
                        ? "confirmado"
                        : "aberto"
                    }

                </span>

                <div style="margin-top:8px;">
                    Pedido: ${p.pedido}
                </div>

                <div style="font-size:.8rem;color:#999;margin-top:4px;">
                    ${p.atendente}
                </div>

                <div style="font-size:.8rem;color:#999;">
                    ${p.data}
                </div>

                ${
                    p.confirmado
                    ? `
                    <div style="font-size:.8rem;color:#8f8;margin-top:4px;">
                        Confirmado por:
                        ${p.confirmado}
                    </div>
                    `
                    : ""
                }

                ${
                    p.foto
                    ? `
                    <img
                        class="item-img"
                        src="${p.foto}"
                    >
                    `
                    : ""
                }

                ${
                    tipoUsuario === "conferencia"
                    &&
                    p.status === "aberto"

                    ? `
                    <button
                        onclick="marcarAprovado('${p.id}')"
                    >
                        CONFIRMAR
                    </button>
                    `
                    : ""
                }

            </div>
            `;
        }).join('');
}

async function limparHistorico(){

    if(
        !confirm(
            "Deseja apagar todo o histórico?"
        )
    ) return;

    try{

        const querySnapshot =
            await getDocs(
                collection(db,"comandas")
            );

        const promessas = [];

        querySnapshot.forEach((documento)=>{

            promessas.push(

                deleteDoc(
                    doc(
                        db,
                        "comandas",
                        documento.id
                    )
                )
            );
        });

        await Promise.all(promessas);

    }catch(e){

        alert("Erro ao limpar.");
    }
}

function fazerLogout(){

    localStorage.removeItem('gb_user');

    location.reload();
}

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker
        .register("service-worker.js");
    });
}

</script>

</body>
</html>
